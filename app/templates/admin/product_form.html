{% extends "base.html" %}

{% block title %}{{ 'Edit' if product else 'New' }} Product{% endblock %}

{% block content %}
<div class="container mt-4">
    <h1>{{ 'Edit' if product else 'New' }} Product</h1>

    <form method="POST" enctype="multipart/form-data" class="mt-4">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        
        <div class="row">
            <div class="col-md-6">
                <div class="mb-3">
                    <label for="name" class="form-label">Product Name</label>
                    <input type="text" class="form-control" id="name" name="name" value="{{ product.name if product else '' }}" required>
                </div>

                <div class="mb-3">
                    <label for="category" class="form-label">Category</label>
                    <select class="form-select" id="category" name="category_id" required>
                        {% for category in categories %}
                        <option value="{{ category.id }}" {% if product and product.category_id == category.id %}selected{% endif %}>
                            {{ category.name }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-3">
                    <label for="price" class="form-label">Price</label>
                    <input type="number" step="0.01" class="form-control" id="price" name="price" value="{{ product.price if product else '' }}" required>
                </div>

                <div class="mb-3">
                    <label for="stock" class="form-label">Stock</label>
                    <input type="number" class="form-control" id="stock" name="stock" value="{{ product.stock if product else 0 }}" required>
                </div>
            </div>

            <div class="col-md-6">
                <div class="mb-3">
                    <label for="description" class="form-label">Description</label>
                    <textarea class="form-control" id="description" name="description" rows="4">{{ product.description if product else '' }}</textarea>
                </div>

                <div class="mb-3">
                    <label for="sku" class="form-label">SKU</label>
                    <input type="text" class="form-control" id="sku" name="sku" value="{{ product.sku if product else '' }}">
                </div>

                <div class="mb-3">
                    <label for="weight" class="form-label">Weight (kg)</label>
                    <input type="number" step="0.01" class="form-control" id="weight" name="weight" value="{{ product.weight if product else '' }}">
                </div>

                <div class="mb-3">
                    <label for="dimensions" class="form-label">Dimensions (LxWxH cm)</label>
                    <input type="text" class="form-control" id="dimensions" name="dimensions" value="{{ product.dimensions if product else '' }}">
                </div>

                <div class="mb-3">
                    <label for="image" class="form-label">Product Image</label>
                    {% if product and product.image_url %}
                    <div class="mb-2">
                        <img src="{{ product.image_url }}" alt="{{ product.name }}" style="max-width: 200px;">
                    </div>
                    {% endif %}
                    <input type="file" class="form-control" id="image" name="image" accept="image/*">
                </div>
            </div>
        </div>

        <div class="mb-3">
            <div class="form-check">
                <input type="checkbox" class="form-check-input" id="is_active" name="is_active" {% if not product or product.is_active %}checked{% endif %}>
                <label class="form-check-label" for="is_active">Active (visible in store)</label>
            </div>
        </div>

        <div class="d-flex justify-content-between">
            <a href="{{ url_for('admin.products') }}" class="btn btn-secondary">Cancel</a>
            <button type="submit" class="btn btn-primary">{{ 'Update' if product else 'Create' }} Product</button>
        </div>
    </form>
</div>
{% endblock %}
